<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Zeno Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --green: #00ff88;
            --green-dim: #00cc66;
            --dark: #050a0e;
            --dark2: #0a1420;
            --card: #0d1f2d;
            --border: #1a3a4a;
            --text: #c8e6f0;
            --muted: #5a8a9f;
            --error: #ff4466;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--dark);
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        .glow {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(0,255,136,0.06) 0%, transparent 70%);
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--muted);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 32px;
            transition: color 0.2s;
        }

        .back-link:hover { color: var(--green); }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 40px;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--green), transparent);
        }

        .card-logo {
            font-family: 'Orbitron', monospace;
            font-size: 1.2rem;
            font-weight: 900;
            color: var(--green);
            letter-spacing: 2px;
            margin-bottom: 6px;
        }

        .card-logo span { color: var(--text); }

        .card-title {
            font-family: 'Orbitron', monospace;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 6px;
        }

        .card-subtitle {
            color: var(--muted);
            font-size: 0.9rem;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: var(--dark2);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus {
            border-color: var(--green);
            box-shadow: 0 0 0 3px rgba(0,255,136,0.08);
        }

        input::placeholder { color: var(--muted); }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--green);
            color: var(--dark);
            border: none;
            border-radius: 6px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 1rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.2s;
        }

        .btn-submit:hover {
            background: var(--green-dim);
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(0,255,136,0.2);
        }

        .btn-submit:active { transform: translateY(0); }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .divider span {
            font-size: 0.8rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .register-link {
            text-align: center;
            font-size: 0.9rem;
            color: var(--muted);
        }

        .register-link a {
            color: var(--green);
            text-decoration: none;
            font-weight: 700;
            transition: color 0.2s;
        }

        .register-link a:hover { color: var(--green-dim); }

        .alert {
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: none;
        }

        .alert-error {
            background: rgba(255,68,102,0.1);
            border: 1px solid rgba(255,68,102,0.3);
            color: var(--error);
        }

        .alert-success {
            background: rgba(0,255,136,0.1);
            border: 1px solid rgba(0,255,136,0.3);
            color: var(--green);
        }
    </style>
</head>
<body>
    <div class="glow"></div>
    <div class="container">
        <a href="/" class="back-link">← Kembali ke Beranda</a>

        <div class="card">
            <div class="card-logo">ZENO<span>STORE</span></div>
            <h1 class="card-title">LOGIN</h1>
            <p class="card-subtitle">Masuk ke akun Zeno Store kamu</p>

            <div class="alert alert-error" id="alertError"></div>
            <div class="alert alert-success" id="alertSuccess"></div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="email@kamu.com" autocomplete="email">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
            </div>

            <button class="btn-submit" id="btnLogin" onclick="handleLogin()">MASUK</button>

            <div class="divider"><span>atau</span></div>

            <div class="register-link">
                Belum punya akun? <a href="/register">Daftar Sekarang</a>
            </div>
        </div>
    </div>

    <script>
        // Enter key support
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') handleLogin();
        });

        async function handleLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btnLogin');
            const alertError = document.getElementById('alertError');
            const alertSuccess = document.getElementById('alertSuccess');

            // Reset alert
            alertError.style.display = 'none';
            alertSuccess.style.display = 'none';

            if (!email || !password) {
                showAlert('alertError', 'Email dan password harus diisi!');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'MEMPROSES...';

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (data.success) {
                    showAlert('alertSuccess', `Selamat datang, ${data.username}! Mengalihkan...`);
                    // Simpan username di localStorage
                    localStorage.setItem('zenoUser', data.username);
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1500);
                } else {
                    showAlert('alertError', data.message);
                    btn.disabled = false;
                    btn.textContent = 'MASUK';
                }
            } catch (err) {
                showAlert('alertError', 'Terjadi kesalahan. Coba lagi.');
                btn.disabled = false;
                btn.textContent = 'MASUK';
            }
        }

        function showAlert(id, message) {
            const el = document.getElementById(id);
            el.textContent = message;
            el.style.display = 'block';
        }
    </script>
</body>
</html>
